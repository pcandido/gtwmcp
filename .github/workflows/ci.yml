name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: package.json

      - name: Lint — check JavaScript syntax
        run: |
          find . -name "*.js" -not -path "./node_modules/*" -not -path "./.git/*" -print0 |
            xargs -0 -I {} node --check {}

      - name: Run unit tests
        run: npm test

      - name: Verify CLI entry point is executable
        run: |
          head -1 bin/gtwmcp.js | grep -q "node"
          echo "✅ Shebang OK"

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Verify package.json
        run: |
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json','utf-8'));
            console.log('Package:', pkg.name, pkg.version);
            if (!pkg.bin?.gtwmcp) throw new Error('Missing bin entry');
            console.log('✅ package.json valid');
          "

      - name: Dry-run publish check
        run: npm pack --dry-run
